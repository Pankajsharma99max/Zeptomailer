services:
  - type: web
    name: certflow
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ZEPTOMAIL_TOKEN
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: SENDER_NAME
        value: Certificate Service
      - key: ADMIN_EMAIL
        sync: false
      - key: BATCH_SIZE
        value: "50"
      - key: BATCH_DELAY_SECONDS
        value: "1.0"
      - key: FRONTEND_ORIGIN
        value: "*"
